<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classic Snake Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #2c3e50;
            font-family: 'Press Start 2P', cursive; /* Retro font for classic feel */
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on mobile while playing */
        }

        /* The Game Boy look */
        .game-boy {
            background-color: #bdc3c7;
            padding: 20px;
            border-radius: 20px 20px 50px 20px;
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.2),
                10px 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Screen border */
        .screen-container {
            background-color: #7f8c8d;
            padding: 20px;
            border-radius: 10px 10px 30px 10px;
            margin-bottom: 20px;
            width: 100%;
            position: relative;
        }

        /* The actual canvas screen */
        canvas {
            background-color: #9bbc0f; /* Classic Nokia green screen color */
            border: 2px solid #306230;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            display: block;
            margin: 0 auto;
            image-rendering: pixelated; /* Keeps it sharp */
        }

        /* On-screen Controls */
        .controls {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 5px;
            margin-top: 10px;
            justify-content: center;
        }

        .d-pad-btn {
            background-color: #34495e;
            border: none;
            border-radius: 10px;
            color: #bdc3c7;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #2c3e50, 0 10px 10px rgba(0,0,0,0.3);
            transition: all 0.1s;
            user-select: none;
        }
        
        .d-pad-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #2c3e50, 0 5px 5px rgba(0,0,0,0.3);
            background-color: #2c3e50;
        }

        .btn-up { grid-column: 2; grid-row: 1; border-radius: 10px 10px 5px 5px; }
        .btn-left { grid-column: 1; grid-row: 2; border-radius: 10px 5px 5px 10px; }
        .btn-right { grid-column: 3; grid-row: 2; border-radius: 5px 10px 10px 5px; }
        .btn-down { grid-column: 2; grid-row: 3; border-radius: 5px 5px 10px 10px; }
        .center-piece { grid-column: 2; grid-row: 2; background-color: #34495e; z-index: -1; } /* Fill gap */

        /* Overlay Screens (Start/Game Over) */
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background-color: rgba(155, 188, 15, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }

        .action-btn {
            background-color: #306230;
            color: #9bbc0f;
            border: 2px solid #0f380f;
            padding: 10px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .action-btn:hover {
            background-color: #0f380f;
        }

        /* Score Display */
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            color: #306230;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="game-boy">
        
        <div class="w-full text-center mb-4 text-gray-600 tracking-widest text-[10px] font-bold">
            SNAKE <i class="fa-solid fa-apple-whole text-red-500"></i>
        </div>

        <div class="screen-container">
            <div class="score-board">
                <span>SCORE: <span id="score">0</span></span>
                <span>HI: <span id="hi-score">0</span></span>
            </div>
            
            <canvas id="gameCanvas" width="280" height="280"></canvas>

            <!-- Start Screen Overlay -->
            <div id="start-screen" class="overlay">
                <h1 class="text-xl text-[#0f380f] mb-2">SNAKE</h1>
                <p class="text-[8px] text-[#306230]">Khelne ke liye click karein</p>
                <button class="action-btn" onclick="startGame()">START</button>
            </div>

            <!-- Game Over Overlay -->
            <div id="game-over-screen" class="overlay" style="display: none;">
                <h1 class="text-lg text-[#0f380f] mb-2">GAME OVER</h1>
                <p class="text-[8px] text-[#306230] mb-2">Aapka Score: <span id="final-score">0</span></p>
                <button class="action-btn" onclick="resetGame()">RETRY</button>
            </div>
        </div>

        <!-- Direction Controls for Mobile -->
        <div class="controls">
            <button class="d-pad-btn btn-up" onmousedown="changeDirection('UP')" ontouchstart="changeDirection('UP')"><i class="fa-solid fa-caret-up"></i></button>
            <button class="d-pad-btn btn-left" onmousedown="changeDirection('LEFT')" ontouchstart="changeDirection('LEFT')"><i class="fa-solid fa-caret-left"></i></button>
            <div class="center-piece"></div>
            <button class="d-pad-btn btn-right" onmousedown="changeDirection('RIGHT')" ontouchstart="changeDirection('RIGHT')"><i class="fa-solid fa-caret-right"></i></button>
            <button class="d-pad-btn btn-down" onmousedown="changeDirection('DOWN')" ontouchstart="changeDirection('DOWN')"><i class="fa-solid fa-caret-down"></i></button>
        </div>

        <!-- Decorative elements -->
        <div class="flex justify-between w-full mt-6 px-4">
            <div class="flex gap-2">
                <div class="w-8 h-2 bg-gray-600 rounded-full transform -rotate-45"></div>
                <div class="w-8 h-2 bg-gray-600 rounded-full transform -rotate-45"></div>
            </div>
            <div class="text-[8px] text-gray-500">CLASSIC EDIT</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game Constants
        const gridSize = 14; // Size of each block
        const tileCount = canvas.width / gridSize; // 280 / 14 = 20 tiles horizontally/vertically
        
        // Colors (Classic Nokia style)
        const snakeColorDark = "#0f380f";
        const snakeColorLight = "#306230";
        const foodColor = "#0f380f";

        // Game State Variables
        let snake = [];
        let food = {};
        let dx = 0; // Velocity X
        let dy = 0; // Velocity Y
        let score = 0;
        let hiScore = localStorage.getItem("snakeHiScore") || 0;
        let gameLoop;
        let speed = 150; // Milliseconds per frame (Lower is faster)
        let isPlaying = false;
        let nextDx = 0; // To prevent rapid double turning
        let nextDy = 0;

        // UI Elements
        document.getElementById("hi-score").innerText = hiScore;
        const scoreElement = document.getElementById("score");
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");

        // Initialize Game
        function initGame() {
            // Start snake in middle
            snake = [
                {x: 10, y: 10},
                {x: 10, y: 11},
                {x: 10, y: 12}
            ];
            
            // Initial direction: moving UP
            dx = 0;
            dy = -1;
            nextDx = 0;
            nextDy = -1;
            
            score = 0;
            scoreElement.innerText = score;
            speed = 150;
            
            spawnFood();
            drawCanvas(); // Draw initial state
        }

        // Start button logic
        function startGame() {
            initGame();
            startScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            isPlaying = true;
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
        }

        // Reset button logic
        function resetGame() {
            startGame();
        }

        // Main Game Loop Update
        function update() {
            if (!isPlaying) return;

            // Apply next direction safely (prevents reversing into itself in one frame)
            dx = nextDx;
            dy = nextDy;

            moveSnake();

            if (checkCollision()) {
                handleGameOver();
                return;
            }

            if (checkFoodCollision()) {
                score += 10;
                scoreElement.innerText = score;
                
                // Increase speed slightly every 50 points
                if (score % 50 === 0 && speed > 60) {
                    clearInterval(gameLoop);
                    speed -= 10;
                    gameLoop = setInterval(update, speed);
                }
                
                spawnFood();
            } else {
                // Remove tail if didn't eat
                snake.pop();
            }

            drawCanvas();
        }

        // Move the snake coordinates
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Add new head
        }

        // Check if snake hit walls or itself
        function checkCollision() {
            const head = snake[0];

            // Wall Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }

            // Self Collision (Start checking from index 1, as 0 is head)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }

            return false;
        }

        // Check if head is on food
        function checkFoodCollision() {
            return snake[0].x === food.x && snake[0].y === food.y;
        }

        // Generate food in a random empty spot
        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                // Make sure food doesn't spawn ON the snake
                validPosition = true;
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            }
        }

        // Draw everything on canvas
        function drawCanvas() {
            // Clear canvas (Nokia Green Background)
            ctx.fillStyle = "#9bbc0f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid (Optional, makes it look more retro)
            ctx.strokeStyle = "rgba(48, 98, 48, 0.1)";
            ctx.lineWidth = 1;
            for(let i=0; i<tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw Food (A small square block)
            ctx.fillStyle = foodColor;
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

            // Draw Snake
            for (let i = 0; i < snake.length; i++) {
                // Head is slightly darker
                ctx.fillStyle = i === 0 ? snakeColorDark : snakeColorLight;
                
                // Draw square block with small gap for retro pixel look
                ctx.fillRect(snake[i].x * gridSize + 1, snake[i].y * gridSize + 1, gridSize - 2, gridSize - 2);
            }
        }

        // Game Over Logic
        function handleGameOver() {
            isPlaying = false;
            clearInterval(gameLoop);
            
            if (score > hiScore) {
                hiScore = score;
                localStorage.setItem("snakeHiScore", hiScore);
                document.getElementById("hi-score").innerText = hiScore;
            }
            
            document.getElementById("final-score").innerText = score;
            gameOverScreen.style.display = "flex";
        }

        // Handle Direction Changes (from Keyboard or UI Buttons)
        function changeDirection(dir) {
            // Prevent changing direction multiple times before the next frame updates
            if(!isPlaying) return;

            if (dir === 'UP' && dy !== 1) {
                nextDx = 0; nextDy = -1;
            } else if (dir === 'DOWN' && dy !== -1) {
                nextDx = 0; nextDy = 1;
            } else if (dir === 'LEFT' && dx !== 1) {
                nextDx = -1; nextDy = 0;
            } else if (dir === 'RIGHT' && dx !== -1) {
                nextDx = 1; nextDy = 0;
            }
        }

        // Keyboard Event Listeners
        window.addEventListener("keydown", (e) => {
            // Prevent default scrolling for arrow keys
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.key) > -1) {
                e.preventDefault();
            }

            switch (e.key) {
                case "ArrowUp":
                case "w":
                case "W":
                    changeDirection('UP');
                    break;
                case "ArrowDown":
                case "s":
                case "S":
                    changeDirection('DOWN');
                    break;
                case "ArrowLeft":
                case "a":
                case "A":
                    changeDirection('LEFT');
                    break;
                case "ArrowRight":
                case "d":
                case "D":
                    changeDirection('RIGHT');
                    break;
            }
        });

        // Initialize display before starting
        initGame();

    </script>
</body>
</html>
