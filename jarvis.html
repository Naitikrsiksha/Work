<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS - NATS Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    
    <!-- LINK TO SAME LOGIC FILE -->
    <script src="aio.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background-color: #010308; color: #00e5ff; font-family: 'Rajdhani', sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden;
        }

        .top-bar { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; z-index: 10; }
        .back-btn { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 20px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: #ff2d78; }

        .reactor-container { position: relative; width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; margin-bottom: 30px; }

        .mic-btn {
            width: 120px; height: 120px; background: rgba(0, 229, 255, 0.1); border: 2px solid #00e5ff;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 45px; color: #00e5ff; cursor: pointer; z-index: 5;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3), inset 0 0 20px rgba(0, 229, 255, 0.2);
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .mic-btn.listening {
            background: rgba(255, 45, 120, 0.2); border-color: #ff2d78; color: #ff2d78;
            box-shadow: 0 0 50px rgba(255, 45, 120, 0.5), inset 0 0 30px rgba(255, 45, 120, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 50px rgba(255, 45, 120, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(255, 45, 120, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 50px rgba(255, 45, 120, 0.5); }
        }

        .ring { position: absolute; border-radius: 50%; border: 1px solid transparent; pointer-events: none; }
        .ring1 { width: 160px; height: 160px; border-top: 2px solid #00e5ff; border-bottom: 2px solid #00e5ff; animation: rotate1 4s linear infinite; }
        .ring2 { width: 190px; height: 190px; border-left: 2px solid rgba(0, 229, 255, 0.5); border-right: 2px solid rgba(0, 229, 255, 0.5); animation: rotate2 6s linear infinite; }

        @keyframes rotate1 { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotate2 { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        #statusText { font-family: 'Orbitron'; font-size: 16px; letter-spacing: 2px; color: rgba(255,255,255,0.6); margin-bottom: 20px; text-transform: uppercase; text-align: center; }
        #transcriptBox {
            width: 90%; max-width: 500px; min-height: 100px; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 10px; padding: 20px;
            text-align: center; font-size: 20px; line-height: 1.4; color: #fff;
            display: flex; flex-direction: column; justify-content: center; gap: 10px;
        }
        
        .user-text { opacity: 0.6; font-size: 16px; font-style: italic; }
        .ai-response-text { color: #00e5ff; font-weight: bold; }

        /* HACKER DEBUGGER PANEL */
        #debugPanel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 120px;
            background: rgba(0, 15, 0, 0.9); color: #0f0; font-family: monospace;
            font-size: 11px; padding: 10px; overflow-y: auto; z-index: 100;
            border-top: 2px solid #0f0; text-align: left; line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Hub</a>
        <div style="font-family: 'Orbitron'; color: #00e5ff; font-weight: 900; letter-spacing: 3px;">JARVIS SYSTEM</div>
    </div>

    <div class="reactor-container">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <!-- Hata diya inline onclick, ab JavaScript se robust listener lagayenge -->
        <div class="mic-btn" id="micBtn">
            <i class="fas fa-microphone"></i>
        </div>
    </div>

    <div id="statusText">SYSTEM READY. TAP MIC TO SPEAK.</div>
    <div id="transcriptBox">
        <div id="userSaid" class="user-text">Listening will appear here...</div>
        <div id="aiSaid" class="ai-response-text">Awaiting Voice Input...</div>
    </div>

    <!-- Naya Debug Panel -->
    <div id="debugPanel">
        <div>> SYSTEM BOOT COMPLETE.</div>
    </div>

<script>
    const games = [
        { id: "1", name: "Bubble Shooter", file: "bubbles.html", tags: ["bubble", "shoot", "shooter"] },
        { id: "2", name: "Raja Mantri Chor Sipahi", file: "chor.html", tags: ["raja", "mantri", "chor", "sipahi"] },
        { id: "3", name: "Classic Snake", file: "snakeus.html", tags: ["snake", "saanp", "snk"] },
        { id: "4", name: "Hill Climb Racer", file: "geminihill.html", tags: ["car", "hill", "pahaad", "racer"] },
        { id: "5", name: "Yuddh Bhoomi", file: "gunish.html", tags: ["war", "army", "gunish", "battle"] },
        { id: "6", name: "Sipahi Game", file: "sipahi.html", tags: ["sipahi", "police", "soldier"] },
        { id: "7", name: "Block Stacker", file: "blocks.html", tags: ["block", "tetris", "box", "stack", "bachpan"] },
        { id: "8", name: "Sci-Fi Badminton", file: "tennis.html", tags: ["tennis", "badminton", "racket", "smash", "sports"] },
        { id: "9", name: "Neon Brick Breaker Pro", file: "bricks.html", tags: ["brick", "breaker", "ball", "paddle", "neon"] },
        { id: "10", name: "Neon Mind Puzzle", file: "memory.html", tags: ["memory", "puzzle", "mind", "color", "brain", "dimag"] },
        { id: "11", name: "T-Rex Runner Pro", file: "dino.html", tags: ["dino", "runner", "jump", "trex", "offline", "dinosaur", "chrome"] }
    ];

    const micBtn = document.getElementById("micBtn");
    const statusText = document.getElementById("statusText");
    const userSaid = document.getElementById("userSaid");
    const aiSaid = document.getElementById("aiSaid");
    const debugPanel = document.getElementById("debugPanel");
    
    let userName = localStorage.getItem("nats_username") || "Boss";
    let isListening = false;
    let audioUnlocked = false;

    // DEBUG LOGGER FUNCTION
    function logDebug(msg) {
        debugPanel.innerHTML += `<div>> ${msg}</div>`;
        debugPanel.scrollTop = debugPanel.scrollHeight;
        console.log("JARVIS:", msg);
    }

    // Speech Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        logDebug("Speech API Supported!");
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-IN'; // Works best globally
        recognition.interimResults = false;

        recognition.onstart = function() {
            logDebug("Mic is now ON. Ready to hear.");
            isListening = true;
            micBtn.classList.add("listening");
            statusText.innerText = "LISTENING... SPEAK NOW";
            statusText.style.color = "#ff2d78";
            userSaid.innerText = "...";
        };

        recognition.onaudiostart = function() { logDebug("Audio source detected..."); };
        recognition.onspeechstart = function() { logDebug("User is speaking..."); };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            logDebug("CAUGHT TEXT: " + transcript);
            userSaid.innerText = `You: "${transcript}"`;
            statusText.innerText = "PROCESSING...";
            processVoiceCommand(transcript);
        };

        recognition.onerror = function(event) {
            logDebug("ERROR OCCURRED: " + event.error);
            if (event.error === 'no-speech') {
                statusText.innerText = "NO SPEECH DETECTED.";
            } else if (event.error === 'not-allowed') {
                statusText.innerText = "MIC PERMISSION DENIED!";
            } else {
                statusText.innerText = "MIC ERROR: " + event.error;
            }
            resetMic();
        };

        recognition.onend = function() {
            logDebug("Mic connection closed.");
            resetMic();
        };
    } else {
        logDebug("API NOT SUPPORTED on this browser.");
        statusText.innerText = "VOICE NOT SUPPORTED HERE";
        statusText.style.color = "red";
    }

    // MASTER FUNCTION TO START MIC
    function toggleListen(e) {
        if(e) e.preventDefault(); // Rok lo double firing
        
        logDebug("Button Tapped!");

        if (!recognition) {
            logDebug("Browser validation failed.");
            return alert("Browser does not support Voice. Try Google Chrome.");
        }
        
        // Audio Unlocker (ek bar chalta hai)
        if (!audioUnlocked) {
            try {
                let unlockUtterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(unlockUtterance);
                audioUnlocked = true;
                logDebug("Audio System Unlocked.");
            } catch(err) {}
        }

        if (isListening) {
            logDebug("Manually stopping mic.");
            recognition.stop();
        } else {
            window.speechSynthesis.cancel(); 
            logDebug("Requesting Mic Access...");
            try {
                recognition.start();
            } catch (err) {
                logDebug("Start Error: " + err.message);
            }
        }
    }

    // EVENT LISTENERS (Dono Touch aur Click support lagaya hai)
    micBtn.addEventListener("click", toggleListen);
    micBtn.addEventListener("touchstart", function(e) {
        // Touch devices par smoothly run karega
        toggleListen(e);
    }, {passive: false});

    function resetMic() {
        isListening = false;
        micBtn.classList.remove("listening");
        if(statusText.innerText === "PROCESSING...") return; 
        statusText.innerText = "SYSTEM STANDBY. TAP MIC TO SPEAK.";
        statusText.style.color = "rgba(255,255,255,0.6)";
    }

    // Voice Output Engine
    function speakText(text, callback) {
        logDebug("Preparing JARVIS Voice...");
        window.speechSynthesis.cancel(); 
        
        let cleanText = text.replace(/<[^>]*>?/gm, ''); 
        aiSaid.innerHTML = "JARVIS: " + cleanText;
        statusText.innerText = "SPEAKING...";
        statusText.style.color = "#00e5ff";

        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        utterance.pitch = 1.0; 
        utterance.rate = 1.0;

        utterance.onstart = function() { logDebug("JARVIS is speaking..."); };
        utterance.onerror = function(e) { logDebug("Speak Error: " + e.error); };

        let callbackFired = false;
        function fireCallback() {
            if(!callbackFired && callback) {
                callbackFired = true;
                logDebug("Executing Game Redirect...");
                callback();
            }
        }

        utterance.onend = function() { logDebug("Finished Speaking."); fireCallback(); };

        synth.speak(utterance);
        if(callback) { setTimeout(fireCallback, 4000); }
    }

    function normalizeText(text) { return (text || '').toLowerCase().replace(/[^\w\sऀ-ॿ]/g, ' ').replace(/\s+/g, ' ').trim(); }

    function processVoiceCommand(rawText) {
        logDebug("Processing Logic...");
        let response = "";
        let foundGame = null;
        let redirectTimeout = null;
        
        const query = normalizeText(rawText);
        const numCheck = rawText.trim();

        foundGame = games.find(g => g.id === numCheck);

        if (!foundGame) {
            let exact = games.find(g => normalizeText(g.name) === query);
            if (exact) foundGame = exact;
            else {
                let direct = games.find(g => query.includes(normalizeText(g.name)) || g.tags.some(tag => query.includes(tag)));
                if (direct) foundGame = direct;
            }
        }

        if (foundGame) {
            response = `Opening ${foundGame.name} right away, ${userName}.`;
            redirectTimeout = () => { window.location.href = foundGame.file; };
        } else if (/\b(hello|hi|hey|namaste)\b/.test(query)) {
            response = `Hello ${userName}. I am online and ready.`;
        } else {
            let aioMatch = null;
            if (typeof aioData !== 'undefined' && aioData.qaList) {
                aioMatch = aioData.qaList.find(qa => qa.keywords.some(k => query.includes(normalizeText(k))));
            }
            if (aioMatch) {
                response = aioMatch.answer.replace(/Bhai/g, userName).replace(/bhai/g, userName);
            } else {
                response = `Sorry ${userName}, I didn't catch that. Please try again.`;
            }
        }

        speakText(response, redirectTimeout);
    }
</script>
</body>
</html>
