<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Stacker: Hardcore Mode</title>
    <style>
        body {
            background: #02040a;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #00f5ff;
            transition: border-color 0.2s;
        }
        /* Danger Effect */
        .danger-border {
            border-color: #ff2d78 !important;
            box-shadow: 0 0 30px #ff2d78 !important;
        }
        canvas {
            display: block;
            background-color: #000;
        }
        #speed-tag {
            margin-bottom: 10px;
            color: #00f5ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            gap: 15px;
            margin-top: 25px;
        }
        .btn {
            width: 75px;
            height: 75px;
            background: rgba(255,255,255,0.05);
            border: 2px solid #00f5ff;
            color: #00f5ff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn:active { background: #00f5ff; color: #000; }
    </style>
</head>
<body>

    <div id="speed-tag">Mode: Survival</div>
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <div class="controls">
        <div></div>
        <div class="btn" onclick="playerRotate(1)">↻</div>
        <div></div>
        <div class="btn" onclick="playerMove(-1)">←</div>
        <div class="btn" onclick="playerDrop()">↓</div>
        <div class="btn" onclick="playerMove(1)">→</div>
    </div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    const speedTag = document.getElementById('speed-tag');
    context.scale(20, 20);

    function createPiece(type) {
        if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
        if (type === 'O') return [[4, 4], [4, 4]];
        if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
    }

    const colors = [null, '#00f5ff', '#ff2d78', '#00ff88', '#f538ff', '#ff8e0d', '#ffe138', '#3877ff'];

    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    context.strokeStyle = '#000';
                    context.lineWidth = 0.05;
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function arenaSweep() {
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            // Base speed increases as you clear lines
            if(baseInterval > 200) baseInterval -= 20; 
        }
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            baseInterval = 1000; // Reset difficulty on game over
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    let dropCounter = 0;
    let baseInterval = 1000;
    let currentInterval = 1000;
    let lastTime = 0;
    let speedBoostTimer = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;

        // Logic for Random Speed Boost
        speedBoostTimer += deltaTime;
        if (speedBoostTimer > 15000) { // Every 15 seconds
            currentInterval = baseInterval / 4; // 4x speed
            container.classList.add('danger-border');
            speedTag.innerText = "WARNING: HIGH SPEED!";
            speedTag.style.color = "#ff2d78";
            
            if (speedBoostTimer > 18000) { // Boost lasts 3 seconds
                speedBoostTimer = 0;
                currentInterval = baseInterval;
                container.classList.remove('danger-border');
                speedTag.innerText = "Mode: Survival";
                speedTag.style.color = "#00f5ff";
            }
        } else {
            currentInterval = baseInterval;
        }

        dropCounter += deltaTime;
        if (dropCounter > currentInterval) playerDrop();
        
        draw();
        requestAnimationFrame(update);
    }

    function createArena(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    const arena = createArena(12, 20);
    const player = { pos: {x: 0, y: 0}, matrix: null };

    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 38) playerRotate(1);
    });

    playerReset();
    update();
</script>
</body>
</html>
