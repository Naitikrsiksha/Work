<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naitik AI v3.0 - Game Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- YAHAN HUMNE TUMHARA 'AIO' WIRE CONNECT KAR DIYA HAI -->
    <script src="aio.js"></script>

    <style>
        :root {
            --bg: #02040a;
            --chat-bg: rgba(14, 22, 40, 0.88);
            --primary: #00e5ff;
            --accent: #ff2d78;
            --text: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            transition: background 0.8s;
        }

        /* ===== NEBULA ===== */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            animation: nebulaFloat 22s ease-in-out infinite alternate;
        }
        .neb1 { width: 420px; height: 420px; background: #1a0050; opacity: 0.13; top: -120px; left: -120px; }
        .neb2 { width: 360px; height: 360px; background: #003845; opacity: 0.12; bottom: -60px; right: -80px; animation-delay: -9s; }
        .neb3 { width: 240px; height: 240px; background: #250018; opacity: 0.11; top: 38%; left: 28%; animation-delay: -15s; }
        @keyframes nebulaFloat {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(22px,28px) scale(1.08); }
        }
        body.theme-simple .nebula, body.theme-rain .nebula, body.theme-sunny .nebula { display: none; }

        /* ===== STARS & CANVAS ===== */
        #starsLayer, #asteroidCanvas, #rainCanvas, #cloudLayer, #sunCanvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        #asteroidCanvas { z-index: 1; }
        #rainCanvas { z-index: 2; display: none; }
        #cloudLayer { height: 96px; z-index: 3; display: none; }
        #sunCanvas { top: -60px; right: -60px; width: 210px; height: 210px; z-index: 2; display: none; }
        
        body.theme-simple #starsLayer, body.theme-rain #starsLayer, body.theme-sunny #starsLayer { display: none; }
        body.theme-simple #asteroidCanvas, body.theme-rain #asteroidCanvas, body.theme-sunny #asteroidCanvas { display: none; }
        body.theme-rain #rainCanvas, body.theme-rain #cloudLayer { display: block; }
        body.theme-sunny #sunCanvas { display: block; }

        /* ===== HEADER ===== */
        .header {
            z-index: 20; padding: 14px 16px;
            background: rgba(8,13,28,0.96);
            border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(18px);
            transition: border-color 0.5s;
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Orbitron'; font-weight: 900; font-size: 15px;
            color: var(--primary); letter-spacing: 2px;
            text-shadow: 0 0 16px var(--primary), 0 0 38px rgba(0,229,255,0.28);
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .status-badge { font-size: 10px; color: #00ff88; }
        .header-btn {
            background: none; border: none; color: rgba(226,232,240,0.5);
            font-size: 16px; cursor: pointer; padding: 4px; transition: color 0.3s;
        }
        .header-btn:hover { color: var(--accent); }

        /* ===== HAMBURGER ===== */
        .ham-btn {
            width: 36px; height: 36px;
            background: rgba(0,229,255,0.07);
            border: 1px solid var(--primary); border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 5px; cursor: pointer; padding: 7px; transition: background 0.25s;
        }
        .ham-btn span { width: 100%; height: 2px; background: var(--primary); border-radius: 2px; display: block; }
        .ham-btn:active { background: rgba(0,229,255,0.18); }

        /* ===== SETTINGS MENU (Themes & Language) ===== */
        #settingsMenu {
            position: fixed; top: 62px; right: 12px; z-index: 200;
            background: rgba(6,12,26,0.97);
            border: 1px solid var(--primary); border-radius: 14px;
            padding: 12px; min-width: 200px;
            display: none; flex-direction: column; gap: 5px;
            backdrop-filter: blur(18px);
            box-shadow: 0 8px 40px rgba(0,229,255,0.18);
            animation: menuDrop 0.22s ease-out;
            max-height: 80vh; overflow-y: auto;
        }
        #settingsMenu.open { display: flex; }
        @keyframes menuDrop {
            from { opacity:0; transform:translateY(-10px) scale(0.95); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        .menu-label {
            font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
            letter-spacing: 1px; margin: 8px 0 4px 4px; font-family: 'Orbitron';
        }
        .menu-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 6px 0; }
        
        .opt-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: 600;
            color: var(--text); transition: all 0.2s;
            border: 1px solid transparent;
        }
        .opt-btn:hover { background: rgba(255,255,255,0.07); }
        .opt-btn.active { border-color: var(--primary); background: rgba(0,229,255,0.08); color: var(--primary); }
        .opt-btn .ico { font-size: 17px; width: 22px; text-align: center; }

        /* ===== CHAT CONTAINER ===== */
        #chat-container {
            flex: 1; padding: 18px 15px 120px;
            overflow-y: auto; display: flex; flex-direction: column;
            gap: 14px; z-index: 5; scroll-behavior: smooth;
        }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); border-radius: 2px; }

        .message {
            max-width: 85%; padding: 12px 16px;
            border-radius: 15px; font-size: 15px;
            line-height: 1.5; word-wrap: break-word;
            animation: msgIn 0.3s ease-out;
        }
        @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .ai-message {
            align-self: flex-start;
            background: rgba(14,22,42,0.88);
            border: 1px solid rgba(0,229,255,0.35);
            border-bottom-left-radius: 3px;
            box-shadow: 0 3px 18px rgba(0,229,255,0.07);
        }
        .user-message {
            align-self: flex-end;
            background: var(--primary); color: #000;
            font-weight: 700; border-bottom-right-radius: 3px;
            box-shadow: 0 3px 18px rgba(0,229,255,0.28);
        }
        .notice-message {
            align-self: center;
            background: rgba(255, 45, 120, 0.15);
            border: 1px solid var(--accent);
            color: #fff; text-align: center;
            font-size: 13px; max-width: 90%;
            border-radius: 8px; padding: 8px 12px;
        }

        /* Game Card */
        .game-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--primary);
            border-radius: 13px; padding: 15px;
            margin-top: 8px; text-align: center; width: 100%;
            box-shadow: 0 4px 24px rgba(0,229,255,0.1);
        }
        .play-btn {
            display: inline-block; background: var(--primary);
            color: #000; text-decoration: none;
            padding: 10px 26px; border-radius: 9px;
            font-weight: 700; margin-top: 10px;
            font-family: 'Orbitron'; font-size: 13px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0,229,255,0.3);
        }
        .play-btn:hover { transform: scale(1.05); }

        /* Typing Indicator */
        .typing-indicator {
            display: none; align-self: flex-start;
            background: rgba(14,22,42,0.88);
            border: 1px solid rgba(0,229,255,0.35);
            border-radius: 15px; border-bottom-left-radius: 3px;
            padding: 12px 16px; margin-bottom: 14px; z-index: 5;
        }
        .typing-indicator span {
            display: inline-block; width: 8px; height: 8px;
            background-color: var(--primary); border-radius: 50%; margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ===== BOTTOM UI ===== */
        .bottom-ui {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,16,32,0.97);
            border-top: 1px solid rgba(0,229,255,0.2);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 50; backdrop-filter: blur(18px);
        }

        .input-area {
            padding: 14px;
            display: flex; gap: 10px; align-items: center;
        }

        input {
            flex: 1; background: rgba(0,0,0,0.55);
            border: 1px solid rgba(0,229,255,0.25);
            padding: 14px 18px; border-radius: 12px;
            color: #fff; font-size: 16px;
            font-family: 'Rajdhani'; outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
        input::placeholder { color: rgba(226,232,240,0.38); }

        .send-btn {
            width: 50px; height: 50px; border-radius: 12px; border: none;
            background: var(--primary); color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; flex-shrink: 0;
            box-shadow: 0 4px 18px rgba(0,229,255,0.28);
            transition: transform 0.15s;
        }
        .send-btn:active { transform: scale(0.91); }

        /* Desktop */
        @media (min-width: 768px) {
            #chat-container { width: 60%; margin: 0 auto; }
            .bottom-ui { width: 60%; left: 20%; right: 20%; border-radius: 20px 20px 0 0; }
        }
    </style>
</head>
<body class="theme-deep-space">

<!-- Effects Layers -->
<div class="nebula neb1"></div><div class="nebula neb2"></div><div class="nebula neb3"></div>
<div id="starsLayer"></div>
<canvas id="asteroidCanvas"></canvas>
<canvas id="rainCanvas"></canvas>
<div id="cloudLayer"></div>
<canvas id="sunCanvas" width="210" height="210"></canvas>

<!-- Header -->
<div class="header">
    <div class="logo"><i class="fas fa-robot" style="margin-right:8px;"></i>NAITIK AI v3.0</div>
    <div class="header-right">
        <div class="status-badge"><i class="fas fa-circle"></i> LIVE</div>
        <button class="header-btn" onclick="clearChat()" title="Clear Chat"><i class="fas fa-broom"></i></button>
        <div class="ham-btn" id="hamBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </div>
</div>

<!-- Settings Menu (Themes & Language) -->
<div id="settingsMenu">
    <div class="menu-label">THEMES</div>
    <div class="opt-btn active" id="theme-deep-space" onclick="setTheme('deep-space')"><span class="ico">🌌</span> Deep Space</div>
    <div class="opt-btn" id="theme-simple" onclick="setTheme('simple')"><span class="ico">⚡</span> Simple UI</div>
    <div class="opt-btn" id="theme-rain" onclick="setTheme('rain')"><span class="ico">🌧️</span> Rainy Season</div>
    <div class="opt-btn" id="theme-sunny" onclick="setTheme('sunny')"><span class="ico">🌞</span> Sunny Day</div>
    
    <div class="menu-divider"></div>
    <div class="menu-label">LANGUAGE</div>
    <div class="opt-btn" id="lang-hi" onclick="setLang('hi')"><span class="ico">🇮🇳</span> Hindi</div>
    <div class="opt-btn" id="lang-en" onclick="setLang('en')"><span class="ico">🇬🇧</span> English</div>
    <div class="opt-btn active" id="lang-hinglish" onclick="setLang('hinglish')"><span class="ico">🗣️</span> Hinglish</div>
</div>

<!-- Chat -->
<div id="chat-container">
    <!-- Chat messages will be injected here -->
</div>

<div class="typing-indicator" id="typingIndicator">
    <span></span><span></span><span></span>
</div>

<!-- Bottom UI -->
<div class="bottom-ui">
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Sawal ya game ka naam likhiye..." onkeypress="if(event.key==='Enter') handleInput()">
        <button class="send-btn" onclick="handleInput()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
// =============================================
//  BACKGROUND EFFECTS (Kept intact)
// =============================================
(function(){ const l=document.getElementById('starsLayer'); let h=''; for(let i=0;i<190;i++){ const x=Math.random()*100,y=Math.random()*100,s=Math.random()*2.4+.4,d=Math.random()*5,dur=Math.random()*4+3,op=Math.random()*.7+.15; h+=`<div style="position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s}px;background:#fff;border-radius:50%;opacity:${op};animation:twinkle ${dur}s ${d}s infinite"></div>`;} l.innerHTML=h; const st=document.createElement('style'); st.textContent=`@keyframes twinkle{0%,100%{opacity:.1;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}`; document.head.appendChild(st);})();
const aC=document.getElementById('asteroidCanvas'),aCtx=aC.getContext('2d'); let rocks=[],aActive=false; function rsA(){aC.width=innerWidth;aC.height=innerHeight;} rsA(); function drA(){aCtx.clearRect(0,0,aC.width,aC.height); if(aActive&&Math.random()>.76) rocks.push({x:Math.random()>.5?Math.random()*aC.width:-130,y:Math.random()>.5?-90:Math.random()*aC.height*.65,sz:Math.random()*6+2.5,vx:Math.random()*13+10,vy:(Math.random()-.5)*5}); rocks.forEach((r,i)=>{const g=aCtx.createRadialGradient(r.x,r.y,0,r.x,r.y,r.sz*3.5);g.addColorStop(0,'rgba(255,110,30,0.9)');g.addColorStop(1,'rgba(255,50,0,0)');aCtx.beginPath();aCtx.arc(r.x,r.y,r.sz*3.5,0,Math.PI*2);aCtx.fillStyle=g;aCtx.fill();aCtx.beginPath();aCtx.arc(r.x,r.y,r.sz,0,Math.PI*2);aCtx.fillStyle=`hsl(${20+Math.random()*25},100%,62%)`;aCtx.fill();r.x+=r.vx;r.y+=r.vy;if(r.x>aC.width+160||r.y>aC.height+160) rocks.splice(i,1);}); requestAnimationFrame(drA);} drA();
const rC=document.getElementById('rainCanvas'),rCtx=rC.getContext('2d'); let drops=[],rRun=false; function rsR(){rC.width=innerWidth;rC.height=innerHeight;} function anR(){if(!rRun)return;rCtx.clearRect(0,0,rC.width,rC.height);while(drops.length<230)drops.push({x:Math.random()*rC.width,y:-30,l:Math.random()*18+12,s:Math.random()*8+8,op:Math.random()*.45+.2,w:Math.random()*.8+.4});drops.forEach((d,i)=>{rCtx.beginPath();rCtx.moveTo(d.x,d.y);rCtx.lineTo(d.x-2,d.y+d.l);rCtx.strokeStyle=`rgba(130,195,255,${d.op})`;rCtx.lineWidth=d.w;rCtx.stroke();d.y+=d.s;if(d.y>rC.height+20)drops[i]={x:Math.random()*rC.width,y:-30,l:d.l,s:d.s,op:d.op,w:d.w};});requestAnimationFrame(anR);} function stR(){rsR();rRun=true;drops=[];anR();document.getElementById('cloudLayer').innerHTML=`<svg width="100%" height="96" viewBox="0 0 800 96" preserveAspectRatio="none"><ellipse cx="90" cy="52" rx="130" ry="44" fill="#182535" opacity=".95"/><ellipse cx="160" cy="34" rx="95" ry="36" fill="#1c2f3e" opacity=".9"/><ellipse cx="410" cy="48" rx="148" ry="44" fill="#172435" opacity=".95"/><ellipse cx="720" cy="54" rx="116" ry="40" fill="#182535" opacity=".95"/></svg>`;} function spR(){rRun=false;rCtx.clearRect(0,0,rC.width,rC.height);document.getElementById('cloudLayer').innerHTML='';}
const sC=document.getElementById('sunCanvas'),sCtx=sC.getContext('2d'); let sAng=0,sRun=false; function anS(){if(!sRun)return;sCtx.clearRect(0,0,210,210);sAng+=.007;const cx=105,cy=105,r=46;sCtx.beginPath();sCtx.arc(cx,cy,96,0,Math.PI*2);sCtx.fillStyle='rgba(255,215,0,0.1)';sCtx.fill();for(let i=0;i<14;i++){const a=(i/14)*Math.PI*2+sAng;sCtx.beginPath();sCtx.moveTo(cx+Math.cos(a)*(r+7),cy+Math.sin(a)*(r+7));sCtx.lineTo(cx+Math.cos(a)*(r+22),cy+Math.sin(a)*(r+22));sCtx.strokeStyle=`rgba(255,200,0,0.5)`;sCtx.lineWidth=2.5;sCtx.stroke();}sCtx.beginPath();sCtx.arc(cx,cy,r,0,Math.PI*2);sCtx.fillStyle='#ffd700';sCtx.fill();requestAnimationFrame(anS);} function stS(){sRun=true;anS();} function spS(){sRun=false;sCtx.clearRect(0,0,210,210);}

// =============================================
//  STATE MANAGEMENT (THEME & LANGUAGE)
// =============================================
let currentTheme = localStorage.getItem('theme') || 'deep-space';
let currentLang = localStorage.getItem('lang') || 'hinglish';

function setTheme(t) {
    if (currentTheme === 'rain') spR();
    if (currentTheme === 'sunny') spS();
    document.body.className = 'theme-' + t;
    currentTheme = t;
    localStorage.setItem('theme', t);
    
    const root = document.documentElement;
    const themes = {
        'deep-space': { primary: '#00e5ff', accent: '#ff2d78', bg: '#02040a' },
        simple:       { primary: '#d0d8e8', accent: '#888',    bg: '#0a0a0a' },
        rain:         { primary: '#5bb8ff', accent: '#74d4ff', bg: '#060e18' },
        sunny:        { primary: '#ffd700', accent: '#ff8c00', bg: '#0d1e35' }
    };
    root.style.setProperty('--primary', themes[t].primary);
    root.style.setProperty('--accent',  themes[t].accent);
    root.style.setProperty('--bg',      themes[t].bg);
    
    if (t === 'rain') stR();
    if (t === 'sunny') stS();
    
    document.querySelectorAll('[id^="theme-"]').forEach(el => el.classList.remove('active'));
    document.getElementById('theme-' + t)?.classList.add('active');
    closeMenu();
}

function setLang(l) {
    currentLang = l;
    localStorage.setItem('lang', l);
    document.querySelectorAll('[id^="lang-"]').forEach(el => el.classList.remove('active'));
    document.getElementById('lang-' + l)?.classList.add('active');
    document.getElementById('userInput').placeholder = i18n[l].placeholder;
    closeMenu();
}

function toggleMenu() { document.getElementById('settingsMenu').classList.toggle('open'); }
function closeMenu()  { document.getElementById('settingsMenu').classList.remove('open'); }
document.addEventListener('click', e => {
    if (!e.target.closest('#settingsMenu') && !e.target.closest('#hamBtn')) closeMenu();
});

// =============================================
//  MULTI-LANGUAGE DICTIONARY (i18n)
// =============================================
const i18n = {
    'hi': {
        placeholder: "सवाल या गेम का नाम लिखें...",
        greeting: "🚀 नमस्ते! मैं <strong>Game Hub AI v3</strong> हूँ।<br><br>आप क्या खेलना चाहेंगे? <em>(उपलब्ध गेम्स की सूची नीचे है)</em>",
        found: (name) => `मिल गया! <strong>${name}</strong> तैयार है। खेलने के लिए नीचे बटन दबाएं।`,
        play_btn: "▶ अभी खेलें (FULL SCREEN)",
        list: "ये रही उपलब्ध गेम्स की सूची:<br>",
        unavailable_known: (name) => `माफ़ करें सर, <strong>${name}</strong> अभी मेरे पास नहीं है।<br><br>उपलब्ध गेम्स हैं:<br>`,
        not_found: "ये मेरे contact के बाहर का question है sorry ..",
    },
    'en': {
        placeholder: "Type a question or game name...",
        greeting: "🚀 Hello! I am <strong>Game Hub AI v3</strong>.<br><br>What would you like to play? <em>(List below)</em>",
        found: (name) => `Found it! <strong>${name}</strong> is ready. Click the button below to play.`,
        play_btn: "▶ PLAY NOW (FULL SCREEN)",
        list: "Here is the list of available games:<br>",
        unavailable_known: (name) => `Sorry sir, <strong>${name}</strong> is currently unavailable.<br><br>Available games are:<br>`,
        not_found: "Sorry, this question is out of my contact ..",
    },
    'hinglish': {
        placeholder: "Sawal ya game ka naam likhiye...",
        greeting: "🚀 Hello boliye! Main <strong>Game Hub AI v3</strong> hoon.<br><br>Inme se aapko kya khelna hai? <em>(Game list niche di gayi hai)</em>",
        found: (name) => `Mil gaya! <strong>${name}</strong> ready hai. Niche button se open kijiye.`,
        play_btn: "▶ PLAY NOW (FULL SCREEN)",
        list: "Ye rahi available games ki list:<br>",
        unavailable_known: (name) => `Sorry sir, <strong>${name}</strong> mere pass abhi available nahi hai.<br><br>Abhi ye games available hain:<br>`,
        not_found: "Ye mere contact ke bahar ka question hai sorry ..",
    }
};

// =============================================
//  GAME DATA & AI LOGIC
// =============================================
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('userInput');
const typingIndicator = document.getElementById('typingIndicator');

const games = [
    { name: "Bubble Shooter",          file: "bubbles.html",     tags: ["bubble", "shoot", "shooter"] },
    { name: "Raja Mantri Chor Sipahi", file: "chor.html",        tags: ["raja", "mantri", "chor", "sipahi"] },
    { name: "Classic Snake",           file: "snakeus.html",     tags: ["snake", "saanp", "snk"] },
    { name: "Hill Climb Racer",        file: "geminihill.html",  tags: ["car", "hill", "pahaad", "racer"] },
    { name: "Yuddh Bhoomi",            file: "gunish.html",      tags: ["war", "army", "gunish", "battle"] },
    { name: "Sipahi Game",             file: "sipahi.html",      tags: ["sipahi", "police", "soldier"] },
    { name: "Block Stacker",           file: "blocks.html",      tags: ["block", "tetris", "box", "stack", "bachpan"] }
];

const unavailableGames = [
    { name: "PUBG", aliases: ["pubg", "playerunknown", "pub g"] },
    { name: "BGMI", aliases: ["bgmi", "battlegrounds mobile india"] },
    { name: "Free Fire", aliases: ["free fire", "ff"] }
];

// Initialize Settings and First Message
setTheme(currentTheme);
setLang(currentLang);

function initChat() {
    chatContainer.innerHTML = '';

    // Check custom instructions from AIO (The Wire)
    if (typeof aioData !== 'undefined' && aioData.customInstruction && aioData.customInstruction.trim() !== "") {
        addMessage(aioData.customInstruction, 'notice');
    }

    const initialMsg = i18n[currentLang].greeting + '<br><br>• ' + games.map(g => g.name).join('<br>• ');
    addMessage(initialMsg, 'ai');
}
initChat();

function clearChat() {
    initChat();
}

function addMessage(html, type) {
    const div = document.createElement('div');
    if (type === 'notice') {
        div.className = `message notice-message`;
    } else {
        div.className = `message ${type}-message`;
    }
    div.innerHTML = html;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
}

function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag] || tag));
}

function normalizeText(text) {
    return (text || '').toLowerCase().replace(/[^\w\sऀ-ॿ]/g, ' ').replace(/\s+/g, ' ').trim();
}

function findUnavailableGame(query) {
    return unavailableGames.find(game => game.aliases.some(alias => query.includes(alias)));
}

function findGame(query) {
    const exact = games.find(g => normalizeText(g.name) === query);
    if (exact) return exact;
    const direct = games.find(g => query.includes(normalizeText(g.name)) || g.tags.some(tag => query.includes(tag)));
    if (direct) return direct;
    const ranked = games.map(g => {
        const hay = `${normalizeText(g.name)} ${g.tags.join(' ')}`;
        let score = 0;
        query.split(' ').forEach(word => {
            if (!word) return;
            if (hay.includes(word)) score += 2;
            if (g.tags.includes(word)) score += 3;
        });
        return { game: g, score };
    }).filter(x => x.score > 0).sort((a, b) => b.score - a.score);
    return ranked.length ? ranked[0].game : null;
}

async function handleInput() {
    const rawText = userInput.value.trim();
    if (!rawText) return;
    
    userInput.value = '';
    const safeText = escapeHTML(rawText);
    addMessage(safeText, 'user');

    chatContainer.appendChild(typingIndicator);
    typingIndicator.style.display = 'block';
    chatContainer.scrollTop = chatContainer.scrollHeight;

    await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));
    
    typingIndicator.style.display = 'none';
    processAIResponse(rawText, normalizeText(rawText));
}

function processAIResponse(rawQuery, query) {
    let response = '';
    let foundGame = null;
    const lang = i18n[currentLang];
    const gameListStr = '• ' + games.map(g => g.name).join('<br>• ');

    const unavailable = findUnavailableGame(query);

    // 1. Basic Greeting Check
    if (/\b(hello|hi|hey|namaste|namaskar|helo|hii)\b/.test(query) || query === 'hello' || query === 'hi') {
        response = lang.greeting + '<br><br>' + gameListStr;
    } 
    // 2. Unavailable Game Check
    else if (unavailable) {
        response = lang.unavailable_known(unavailable.name) + gameListStr;
    } 
    // 3. Game List Check
    else if (/\b(list|naam|names|available|games|kaunse|kaun kaun|show)\b/.test(query)) {
        response = lang.list + gameListStr;
    } 
    else {
        // 4. Try to find if it's a Game request
        foundGame = findGame(query);
        
        if (foundGame) {
            response = lang.found(foundGame.name);
        } else {
            // 5. Game nahi mila? Toh AIO LOGIC (The Wire) me check karo
            let aioMatch = null;
            if (typeof aioData !== 'undefined' && aioData.qaList) {
                // Check agar koi keyword user ke query se match kar raha hai
                aioMatch = aioData.qaList.find(qa => 
                    qa.keywords.some(k => query.includes(normalizeText(k)))
                );
            }

            if (aioMatch) {
                // AIO me jawab mil gaya
                response = aioMatch.answer;
            } else {
                // Kahin nahi mila (Fallback)
                response = lang.not_found;
            }
        }
    }

    addMessage(response, 'ai');

    // Agar game mila toh uska Play Button card dikhao
    if (foundGame) {
        const gc = document.createElement('div');
        gc.className = 'game-card';
        gc.innerHTML = `<div style="font-weight:bold;color:var(--primary);margin-bottom:6px;">🎮 ${foundGame.name}</div>
                        <a href="${foundGame.file}" class="play-btn">${lang.play_btn}</a>`;
        chatContainer.appendChild(gc);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
}

window.addEventListener('resize', () => { rsA(); if (rRun) rsR(); });
</script>
