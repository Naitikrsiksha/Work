<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Booking App</title>
    <style>
        :root { --primary: #25D366; --dark: #128C7E; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: var(--bg); margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 450px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--dark); text-align: center; margin-top: 0; }
        label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(37, 211, 102, 0.2); }
        
        #preview { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; border: 2px dashed #ddd; }
        
        .result-box { background: #f8f9fa; border-left: 5px solid var(--primary); padding: 15px; border-radius: 4px; margin: 20px 0; }
        .total-text { font-size: 20px; color: #333; margin: 0; }
        #totalPrice { color: var(--dark); font-weight: bold; }

        button { background-color: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: var(--dark); }
        .footer-note { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Service Request</h2>
    
    <label>What work do you need?</label>
    <input type="text" id="workType" placeholder="e.g., House Painting, Car Repair">

    <label>Your Address / Location</label>
    <textarea id="address" rows="2" placeholder="Enter your full address"></textarea>

    <label>Upload Work Image (Optional)</label>
    <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
    <img id="preview" alt="Work Preview">

    <label>Work Fee (Base Charge) - ₹</label>
    <input type="number" id="workFee" placeholder="0" oninput="calculateTotal()">

    <label>Distance from Workshop (km)</label>
    <input type="number" id="distance" placeholder="0" oninput="calculateTotal()">

    <div class="result-box">
        <p class="total-text">Total Price: ₹<span id="totalPrice">0</span></p>
    </div>

    <button onclick="sendRequest()">Book via WhatsApp</button>
    <p class="footer-note">Note: Please attach the photo manually in WhatsApp.</p>
</div>

<script>
    // Show image preview when selected
    function previewImage(event) {
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(event.target.files[0]);
        preview.style.display = 'block';
    }

    function calculateTotal() {
        const workFee = parseFloat(document.getElementById('workFee').value) || 0;
        const distance = parseFloat(document.getElementById('distance').value) || 0;
        const kmRate = 2;

        // Math: Work Fee + (Distance * 2)
        const total = workFee + (distance * kmRate);
        document.getElementById('totalPrice').innerText = total;
    }

    function sendRequest() {
        const work = document.getElementById('workType').value || "Not specified";
        const address = document.getElementById('address').value || "Not provided";
        const total = document.getElementById('totalPrice').innerText;
        const phone = "917766953200";

        const messageText = `*New Service Request*
--------------------------
*Work:* ${work}
*Address:* ${address}
*Estimate:* ₹${total}
--------------------------
(I have attached a photo below)`;

        const url = `https://wa.me/${phone}?text=${encodeURIComponent(messageText)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
