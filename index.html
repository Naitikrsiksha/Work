<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Field Service Pro</title>
    <style>
        :root { 
            --primary: #25D366; 
            --dark: #075E54; 
            --blue: #3498db;
            --bg: #f4f7f6; 
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--dark); margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }

        #preview-container { margin-top: 15px; text-align: center; }
        #preview { width: 100%; max-height: 250px; object-fit: contain; border-radius: 10px; display: none; border: 1px solid #eee; }
        
        .price-card { background: #e8f5e9; padding: 20px; border-radius: 15px; margin-top: 25px; text-align: center; border: 1px dashed var(--primary); }
        .price-card h3 { margin: 0; color: var(--dark); font-size: 24px; }

        .btn-send { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); transition: 0.2s; }
        .btn-call { background: var(--blue); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; text-decoration: none; display: block; text-align: center; box-sizing: border-box; }
        
        .btn-send:active, .btn-call:active { transform: scale(0.98); }
        
        .info-note { font-size: 11px; color: #666; text-align: center; margin-top: 15px; line-height: 1.4; background: #fffde7; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Service Request App</h2>

    <label>Select Work Category</label>
    <select id="category">
        <option value="General Work">General / Other</option>
        <option value="Cleaning">Cleaning Service</option>
        <option value="Electric/Plumbing">Electric/Plumbing Repair</option>
        <option value="Delivery">Pickup & Delivery</option>
        <option value="Labor">Construction/Labor</option>
    </select>

    <label>Work Description</label>
    <textarea id="workDesc" rows="2" placeholder="Describe what needs to be done..."></textarea>

    <div class="row">
        <div>
            <label>Preferred Date</label>
            <input type="date" id="workDate">
        </div>
        <div>
            <label>Preferred Time</label>
            <input type="time" id="workTime">
        </div>
    </div>

    <label>Your Full Address</label>
    <input type="text" id="address" placeholder="House No, Area, Landmark">

    <label>Upload Photo of Work</label>
    <input type="file" id="imageInput" accept="image/*" onchange="showPreview(event)">
    <div id="preview-container">
        <img id="preview" src="#" alt="Work Preview">
    </div>

    <div class="row">
        <div>
            <label>Work Fee (₹)</label>
            <input type="number" id="baseFee" value="0" oninput="updatePrice()">
        </div>
        <div>
            <label>Distance (km)</label>
            <input type="number" id="dist" value="0" oninput="updatePrice()">
        </div>
    </div>

    <div class="price-card">
        <p style="margin:0; font-size: 14px;">Estimated Total (₹2/km added)</p>
        <h3>₹<span id="displayTotal">0</span></h3>
    </div>

    <button class="btn-send" onclick="handleBooking()">Book via WhatsApp</button>
    <a href="tel:+917766953200" class="btn-call">📞 Call Now for Urgent Work</a>
    
    <p class="info-note">
        <b>HOW TO ATTACH PHOTO:</b><br>
        After clicking "Book", WhatsApp will open. 1. Send the text message. 2. Use the paperclip (📎) icon in WhatsApp to attach your photo.
    </p>
</div>

<script>
    // 1. Function to show the image preview on the screen
    function showPreview(event) {
        const preview = document.getElementById('preview');
        if(event.target.files.length > 0) {
            preview.src = URL.createObjectURL(event.target.files[0]);
            preview.style.display = 'block';
        }
    }

    // 2. Logic to calculate price: Base Fee + (KM * 2)
    function updatePrice() {
        const fee = parseFloat(document.getElementById('baseFee').value) || 0;
        const km = parseFloat(document.getElementById('dist').value) || 0;
        const total = fee + (km * 2);
        document.getElementById('displayTotal').innerText = total;
    }

    // 3. Logic to send data to WhatsApp
    async function handleBooking() {
        const category = document.getElementById('category').value;
        const desc = document.getElementById('workDesc').value || "No extra details";
        const date = document.getElementById('workDate').value || "ASAP";
        const time = document.getElementById('workTime').value || "Anytime";
        const addr = document.getElementById('address').value || "Not shared";
        const finalPrice = document.getElementById('displayTotal').innerText;
        
        const phone = "917766953200";

        // Create the formatted message
        const text = `*NEW SERVICE BOOKING*\n` +
                     `--------------------------\n` +
                     `*Category:* ${category}\n` +
                     `*Description:* ${desc}\n` +
                     `*Schedule:* ${date} at ${time}\n` +
                     `*Address:* ${addr}\n` +
                     `*Estimate:* ₹${finalPrice}\n` +
                     `--------------------------\n` +
                     `_Note: Sending the photo manually now..._`;

        // Check if the device supports the "Share" menu (best for mobile)
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Service Booking Request',
                    text: text,
                });
            } catch (err) {
                // Fallback to direct WhatsApp link if they cancel the share menu
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
            }
        } else {
            // Desktop/Old Browser fallback
            alert("Opening WhatsApp... Please remember to attach your photo manually!");
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }
    }
</script>

</body>
</html>
