<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Rex Runner Pro - Naitik AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #02040a;
            --primary: #00e5ff;
            --accent: #ff2d78;
            --dino-color: #e2e8f0;
            --ground-color: #535353;
            --text-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(circle at top, rgba(0, 229, 255, 0.05), transparent 60%);
        }

        .header {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        p.subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 3px;
        }

        /* Game Container */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
        }

        canvas {
            background-color: transparent;
            width: 100%;
            max-width: 800px;
            image-rendering: pixelated;
        }

        #gameOverMsg {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(2, 4, 10, 0.85);
            padding: 20px;
            border: 2px solid var(--accent);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 45, 120, 0.4);
            backdrop-filter: blur(5px);
        }

        #gameOverMsg h2 {
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .restart-icon {
            font-size: 30px;
            cursor: pointer;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            transition: transform 0.2s;
        }

        .restart-icon:active { transform: scale(0.8); }

        /* Mobile Neon Controls */
        .mobile-controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 20;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.1s ease;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Duck Button (Pink) */
        .btn-duck {
            color: var(--accent);
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(255, 45, 120, 0.3), inset 0 0 10px rgba(255, 45, 120, 0.2);
        }
        .btn-duck:active, .btn-duck.active {
            transform: scale(0.85);
            background: rgba(255, 45, 120, 0.2);
            box-shadow: 0 0 25px rgba(255, 45, 120, 0.6), inset 0 0 20px rgba(255, 45, 120, 0.5);
        }

        /* Jump Button (Cyan) */
        .btn-jump {
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3), inset 0 0 10px rgba(0, 229, 255, 0.2);
        }
        .btn-jump:active, .btn-jump.active {
            transform: scale(0.85);
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6), inset 0 0 20px rgba(0, 229, 255, 0.5);
        }

        @media (min-width: 768px) {
            .mobile-controls { display: none; } /* PC par butons nahi dikhenge */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>T-REX RUNNER</h1>
        <p class="subtitle">NATS MODEL ENGINE</p>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="250"></canvas>
        
        <div id="gameOverMsg">
            <h2>G A M E <br> O V E R</h2>
            <div class="restart-icon" id="restartBtn">↻</div>
        </div>
    </div>

    <!-- Naye Neon Control Buttons -->
    <div class="mobile-controls">
        <div class="ctrl-btn btn-duck" id="btnDuck">▼</div>
        <div class="ctrl-btn btn-jump" id="btnJump">▲</div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gameOverMsg = document.getElementById("gameOverMsg");
    
    // Buttons
    const btnJump = document.getElementById("btnJump");
    const btnDuck = document.getElementById("btnDuck");
    const restartBtn = document.getElementById("restartBtn");

    // Game Variables
    let frames = 0;
    let gameSpeed = 6;
    let isGameOver = false;
    let score = 0;
    let highScore = localStorage.getItem("dinoHighScore") || 0;
    let obstacles = [];
    let clouds = [];
    let groundBumps = [];

    // Dino Object
    const dino = {
        x: 50,
        y: 190, 
        w: 40,
        h: 44,
        dy: 0,
        gravity: 0.6,
        jumpPower: -10.5,
        isJumping: false,
        isDucking: false,
        runFrame: 0,
        
        draw: function() {
            ctx.fillStyle = "var(--dino-color)";
            
            if (frames % 10 === 0 && !this.isJumping) {
                this.runFrame = this.runFrame === 0 ? 1 : 0;
            }

            if (this.isDucking) {
                // Ducking Shape
                ctx.fillRect(this.x, this.y + 20, 55, 24); 
                ctx.fillRect(this.x + 55, this.y + 20, 20, 10); 
                ctx.fillStyle = "var(--bg)"; ctx.fillRect(this.x + 60, this.y + 22, 4, 4); 
                ctx.fillStyle = "var(--dino-color)";
                
                if (this.runFrame === 0) {
                    ctx.fillRect(this.x + 10, this.y + 44, 6, 6);
                    ctx.fillRect(this.x + 40, this.y + 44, 6, 6);
                } else {
                    ctx.fillRect(this.x + 20, this.y + 44, 6, 6);
                    ctx.fillRect(this.x + 30, this.y + 44, 6, 6);
                }
            } else {
                // Standing Shape
                ctx.fillRect(this.x + 20, this.y, 20, 18); 
                ctx.fillRect(this.x + 20, this.y + 8, 26, 8); 
                ctx.fillStyle = "var(--bg)"; ctx.fillRect(this.x + 24, this.y + 4, 4, 4); 
                ctx.fillStyle = "var(--dino-color)";
                
                ctx.fillRect(this.x + 12, this.y + 18, 24, 20); 
                ctx.fillRect(this.x, this.y + 18, 12, 10); 
                ctx.fillRect(this.x + 6, this.y + 28, 6, 6); 
                ctx.fillRect(this.x + 32, this.y + 22, 10, 4); 
                
                if (this.isJumping) {
                    ctx.fillRect(this.x + 12, this.y + 38, 6, 6);
                    ctx.fillRect(this.x + 24, this.y + 38, 6, 6);
                } else if (this.runFrame === 0) {
                    ctx.fillRect(this.x + 12, this.y + 38, 6, 12); 
                    ctx.fillRect(this.x + 24, this.y + 38, 6, 6);  
                } else {
                    ctx.fillRect(this.x + 12, this.y + 38, 6, 6);  
                    ctx.fillRect(this.x + 24, this.y + 38, 6, 12); 
                }
            }
        },
        
        update: function() {
            this.dy += this.gravity;
            this.y += this.dy;

            if (this.y >= 190) {
                this.y = 190;
                this.dy = 0;
                this.isJumping = false;
            }
        },

        jump: function() {
            if (!this.isJumping && !this.isDucking) {
                this.dy = this.jumpPower;
                this.isJumping = true;
            }
        },

        duck: function(state) {
            if (!this.isJumping) {
                this.isDucking = state;
            } else if (state && this.isJumping) {
                this.dy += 1.5; // Fast drop
            }
        }
    };

    const ground = {
        y: 235,
        draw: function() {
            ctx.fillStyle = "var(--ground-color)";
            ctx.fillRect(0, this.y, canvas.width, 2);
            
            if (frames % 10 === 0) groundBumps.push({ x: canvas.width, w: Math.random() * 5 + 2 });
            groundBumps.forEach((b, i) => {
                ctx.fillRect(b.x, this.y + 2, b.w, 2);
                b.x -= gameSpeed;
                if (b.x < -10) groundBumps.splice(i, 1);
            });
        }
    };

    function drawCloud(x, y) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
        ctx.fillRect(x, y, 30, 10);
        ctx.fillRect(x + 10, y - 10, 20, 10);
        ctx.fillRect(x + 20, y, 20, 10);
    }

    class Obstacle {
        constructor(type) {
            this.type = type; 
            this.x = canvas.width;
            
            if (this.type === 1) {
                this.y = 195; this.w = 15; this.h = 35;
                this.count = Math.floor(Math.random() * 3) + 1; 
            } else if (this.type === 2) {
                this.y = 185; this.w = 22; this.h = 45;
                this.count = Math.floor(Math.random() * 2) + 1; 
            } else if (this.type === 3) {
                this.y = Math.random() > 0.5 ? 150 : 180; 
                this.w = 40; this.h = 20;
                this.flap = 0;
            }
        }

        draw() {
            ctx.fillStyle = "var(--dino-color)";
            if (this.type === 1 || this.type === 2) {
                for (let i = 0; i < this.count; i++) {
                    let cx = this.x + (i * (this.w + 5));
                    ctx.fillRect(cx, this.y, this.w, this.h); 
                    ctx.fillRect(cx - 5, this.y + 10, 5, this.h/2); 
                    ctx.fillRect(cx + this.w, this.y + 5, 5, this.h/2 - 5); 
                }
            } else if (this.type === 3) {
                if (frames % 15 === 0) this.flap = this.flap === 0 ? 1 : 0;
                ctx.fillRect(this.x + 10, this.y + 10, 20, 8); 
                ctx.fillRect(this.x + 30, this.y + 12, 10, 4); 
                if (this.flap === 0) ctx.fillRect(this.x + 15, this.y, 10, 10); 
                else ctx.fillRect(this.x + 15, this.y + 18, 10, 10); 
            }
        }

        update() {
            this.x -= gameSpeed;
            if (this.type === 3) this.x -= 0.5; 
            this.draw();
        }
    }

    function spawnObstacle() {
        if (frames % Math.floor(Math.random() * 60 + 80) === 0) { 
            let type = score > 300 && Math.random() > 0.7 ? 3 : (Math.random() > 0.5 ? 2 : 1);
            obstacles.push(new Obstacle(type));
        }
    }

    function drawScore() {
        ctx.fillStyle = "var(--text-color)";
        ctx.font = "12px 'Press Start 2P', monospace";
        let scoreStr = Math.floor(score).toString().padStart(5, '0');
        let hiStr = highScore.toString().padStart(5, '0');
        ctx.fillText(`HI ${hiStr}  ${scoreStr}`, canvas.width - 200, 30);
    }

    function handleCollisions() {
        for (let i = 0; i < obstacles.length; i++) {
            let o = obstacles[i];
            let hitW = o.type === 3 ? o.w : (o.w * o.count);
            
            let hitX = dino.x + 10 < o.x + hitW && dino.x + (dino.isDucking ? 50 : 30) > o.x;
            let hitY = dino.y + 10 < o.y + o.h && dino.y + (dino.isDucking ? 24 : 40) > o.y;

            if (hitX && hitY) {
                isGameOver = true;
                gameOverMsg.style.display = "block";
                if (Math.floor(score) > highScore) {
                    highScore = Math.floor(score);
                    localStorage.setItem("dinoHighScore", highScore);
                }
            }
        }
    }

    // --- CONTROLS LOGIC ---

    function doJump(e) {
        if(e) e.preventDefault();
        if (isGameOver) resetGame();
        else {
            btnJump.classList.add('active');
            dino.jump();
            setTimeout(() => btnJump.classList.remove('active'), 150);
        }
    }

    function doDuckStart(e) {
        if(e) e.preventDefault();
        if (isGameOver) resetGame();
        else {
            btnDuck.classList.add('active');
            dino.duck(true);
        }
    }

    function doDuckEnd(e) {
        if(e) e.preventDefault();
        btnDuck.classList.remove('active');
        dino.duck(false);
    }

    // Connect Buttons
    btnJump.addEventListener("touchstart", doJump, {passive: false});
    btnJump.addEventListener("mousedown", doJump);

    btnDuck.addEventListener("touchstart", doDuckStart, {passive: false});
    btnDuck.addEventListener("mousedown", doDuckStart);
    
    btnDuck.addEventListener("touchend", doDuckEnd, {passive: false});
    btnDuck.addEventListener("mouseup", doDuckEnd);
    btnDuck.addEventListener("mouseleave", doDuckEnd); // If mouse dragged out

    restartBtn.addEventListener("click", resetGame);

    // PC Keyboard Connect
    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp") doJump(e);
        if (e.code === "ArrowDown" && !isGameOver) doDuckStart(e);
    });
    window.addEventListener("keyup", (e) => {
        if (e.code === "ArrowDown") doDuckEnd(e);
    });

    function resetGame() {
        obstacles = [];
        clouds = [];
        frames = 0;
        score = 0;
        gameSpeed = 6;
        dino.y = 190;
        dino.dy = 0;
        isGameOver = false;
        gameOverMsg.style.display = "none";
        loop();
    }

    function loop() {
        if (isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (frames % 120 === 0) clouds.push({ x: canvas.width, y: Math.random() * 80 + 20 });
        clouds.forEach((c, i) => { drawCloud(c.x, c.y); c.x -= gameSpeed * 0.3; if (c.x < -40) clouds.splice(i, 1); });

        ground.draw();
        dino.update();
        dino.draw();
        
        spawnObstacle();
        
        obstacles.forEach((o, i) => { o.update(); if (o.x + o.w * 3 < 0) obstacles.splice(i, 1); });

        drawScore();
        handleCollisions();

        score += 0.05;
        if (frames % 600 === 0 && gameSpeed < 14) gameSpeed += 0.5;

        frames++;
        requestAnimationFrame(loop);
    }

    loop();

</script>
</body>
</html>
